
services:

  # -----------------------------------------------------------------------
  # PostgreSQL - metadata (users, jobs, results, deployments) - T-1.3
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: devguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devguard}
      POSTGRES_DB: ${POSTGRES_DB:-devguard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devguard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------------------
  # Redis - Celery broker/backend - T-1.4
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: devguard-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------------------
  # Qdrant - vector store for RAG - T-1.11
  # -----------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: devguard-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # -----------------------------------------------------------------------
  # FastAPI backend - T-1.2 (Oussema)
  # Includes the LangGraph orchestrator (T-1.9, Hbib) and, once T-1.10 is
  # done, the WebSocket endpoint for real-time progress.
  # -----------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
    container_name: devguard-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devguard}:${POSTGRES_PASSWORD:-devguard}@postgres:5432/${POSTGRES_DB:-devguard}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ../src:/app/src

  # -----------------------------------------------------------------------
  # Celery worker - async agent execution - T-1.4 / T-2.14
  # -----------------------------------------------------------------------
  celery_worker:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.celery
    container_name: devguard-celery-worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devguard}:${POSTGRES_PASSWORD:-devguard}@postgres:5432/${POSTGRES_DB:-devguard}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src

  # -----------------------------------------------------------------------
  # React frontend - T-1.16 (Karim)
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: ../src/frontend
      dockerfile: ../../infrastructure/Dockerfile.frontend
    container_name: devguard-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}
      VITE_WS_URL: ws://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ../src/frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  qdrant_data:
